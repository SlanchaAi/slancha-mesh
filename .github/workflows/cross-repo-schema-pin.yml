name: cross-repo-schema-pin

# Validates the canonical fixture at mesh/contracts/mesh_usage_event.json
# against the published MeshUsageEvent JSON Schema in slancha-shared (PUBLIC),
# generated from the slancha-api MeshUsageEvent Pydantic.
#
# Catches drift in either direction:
#   - someone edits the fixture in a wire-incompatible way → this fails
#   - slancha-api tightens MeshUsageEvent + republishes the schema → this fails
#
# Why slancha-shared (not a direct slancha-api checkout): slancha-api is
# PRIVATE, so checking it out here with the repo-scoped default GITHUB_TOKEN
# 404'd. slancha-shared is public; slancha-api owns regenerating the schema.

on:
  pull_request:
    paths:
      - "mesh/contracts/**"
      - "mesh/tests/test_cross_repo_usage_event.py"
      - "mesh/quality_probe.py"
      - "mesh/select.py"
      - "mesh/models.py"
      - "mesh/validate_card.py"
      - "mesh/catalog/**"
      # Promotion-gate source of truth — slancha-local mirrors these; the
      # gate-parity job below fails when a change here drifts from the mirror.
      - "mesh/eval/gate.py"
      - "mesh/eval/runner.py"
      # Signing/identity sources are ALSO a cross-repo contract (slancha-local +
      # kanpai mirror their shapes). Without these a signing-only PR skipped the
      # parity workflow entirely (#128).
      - "mesh/eval/row_sign.py"
      - "mesh/eval/seed_verify.py"
      - "mesh/identity.py"
      - ".github/workflows/cross-repo-schema-pin.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cross-repo-schema-pin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slancha-mesh
        uses: actions/checkout@v5
        with:
          path: slancha-mesh

      - name: Checkout slancha-shared (public — canonical schema)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-shared
          # PUBLIC → default GITHUB_TOKEN can read it (no PAT). Hosts
          # schemas/mesh-usage-event.schema.json.
          ref: main
          path: slancha-shared

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mesh deps
        working-directory: slancha-mesh
        run: |
          pip install --upgrade pip
          pip install -e .[dev]   # includes jsonschema

      - name: Run cross-repo schema-pin
        working-directory: slancha-mesh
        env:
          SLANCHA_SHARED_PATH: ${{ github.workspace }}/slancha-shared
        run: |
          pytest -q mesh/tests/test_cross_repo_usage_event.py

      - name: Validate catalog (substrate sanity)
        working-directory: slancha-mesh
        run: |
          python -m mesh.validate_card --strict

  gate-parity:
    # Validates that slancha-local's mirror of the promotion gate
    # (slancha_local.train.gate) stays in sync with the source of truth here:
    # mesh.eval.gate (GateThresholds / PromotionVerdict / append_verdict) and
    # mesh.eval.runner.EvalPass.to_row().
    #
    # The guard lives in slancha-local (tests/test_gate_cross_repo_compat.py)
    # and SKIPS when slancha-mesh isn't on disk — so slancha-local's own CI,
    # which never checks out mesh, can't catch mesh-side gate drift. Running it
    # HERE, against this PR's mesh tree, makes that drift fail centrally on the
    # mesh PR that introduces it instead of silently passing on both sides.
    #
    # slancha-local is PUBLIC → the default GITHUB_TOKEN checks it out (no PAT).
    # No mesh install needed: the guard AST-parses mesh's source for structural
    # parity and imports mesh.eval.gate via sys.path for behavior parity —
    # mesh.eval.gate is stdlib-only and mesh.models needs only pydantic, which
    # slancha-local already pulls in (via fastapi).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slancha-mesh (gate source under test)
        uses: actions/checkout@v5
        with:
          path: slancha-mesh

      - name: Checkout slancha-local (public — hosts the parity guard)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-local
          ref: main
          path: slancha-local

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install slancha-local (the consumer + its test deps)
        working-directory: slancha-local
        run: |
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Sanity — mesh gate source present (guard must not silently skip)
        # The guard skipif's on mesh-not-on-disk; a wrong/missing checkout would
        # turn every parity test into a no-op green. Fail loud here instead.
        run: test -f "${{ github.workspace }}/slancha-mesh/mesh/eval/gate.py"

      - name: Run gate/verdict cross-repo parity guard
        working-directory: slancha-local
        env:
          SLANCHA_MESH_PATH: ${{ github.workspace }}/slancha-mesh
        run: |
          pytest -q tests/test_gate_cross_repo_compat.py
